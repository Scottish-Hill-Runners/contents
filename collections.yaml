version: 2
collections:
  - id: documents
    label: Documents
    usage:
      - document-attachments
      - archive-references
    doNotUseFor:
      - decorative-backgrounds
      - homepage-mosaics
    items:
      - path: "blobs/new-SHR-web-site.pdf"
        tier: document
        title: "SHR community website content plan"
        description: "Content plan for the SHR community website."
        tags: [document, presentation, archive]
  - id: homepage-decorative
